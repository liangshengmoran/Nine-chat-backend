<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>Nine-Chat 项目文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Nine-Chat 实时音乐聊天室 — 完整项目文档">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --docsify-example-panels-document-width: 90%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .sidebar-nav>ul>li>a {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 0.3px;
      color: #666;
    }

    .markdown-section h1 {
      font-size: 2rem;
      font-weight: 700;
    }

    .markdown-section h2 {
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }

    .markdown-section table {
      display: table;
      width: 100%;
    }

    .markdown-section table th {
      background: #f8f8f8;
    }

    .markdown-section table td,
    .markdown-section table th {
      border: 1px solid #eaeaea;
      padding: 8px 12px;
    }

    .method-get,
    .method-post,
    .method-put,
    .method-delete,
    .method-patch {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      font-family: monospace;
      min-width: 50px;
      text-align: center
    }

    .method-get {
      background: #e8f5e9;
      color: #2e7d32
    }

    .method-post {
      background: #e3f2fd;
      color: #1565c0
    }

    .method-put {
      background: #fff3e0;
      color: #e65100
    }

    .method-delete {
      background: #fbe9e7;
      color: #c62828
    }

    .method-patch {
      background: #f3e5f5;
      color: #7b1fa2
    }

    .auth-jwt {
      background: #fff3e0;
      color: #e65100;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600
    }

    .auth-bot {
      background: #f3e5f5;
      color: #7b1fa2;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600
    }

    .auth-admin {
      background: #fbe9e7;
      color: #c62828;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600
    }

    .auth-none {
      background: #f5f5f5;
      color: #999;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin: 24px 0
    }

    .feature-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 20px 24px;
      transition: all .2s
    }

    .feature-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
      border-color: #42b983
    }

    .feature-card h4 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      color: #2c3e50
    }

    .feature-card p {
      color: #666;
      font-size: 14px;
      margin: 0;
      line-height: 1.7
    }

    .ws-event {
      background: #f3e5f5;
      color: #7b1fa2;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 13px
    }

    .tip-block {
      background: #f0f9eb;
      border-left: 4px solid #42b983;
      padding: 12px 16px;
      border-radius: 0 4px 4px 0;
      margin: 16px 0
    }

    .warning-block {
      background: #fdf6ec;
      border-left: 4px solid #e6a23c;
      padding: 12px 16px;
      border-radius: 0 4px 4px 0;
      margin: 16px 0
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '📖 Nine-Chat',
      nameLink: '/docs-site/',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
      search: {
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        paths: 'auto',
        depth: 4,
      },
      copyCode: {
        buttonText: '复制',
        successText: '已复制',
      },
      pagination: {
        previousText: '← 上一篇',
        nextText: '下一篇 →',
        crossChapter: true,
        crossChapterText: true,
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-nginx.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
</body>

</html>
